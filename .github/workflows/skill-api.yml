name: Skill API Checks

on:
  pull_request:
  push:
    branches:
      - main
      - codex/skill-api-v1

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r codeshift-backend/requirements.txt

      - name: Compile backend modules
        run: python3 -m py_compile codeshift-backend/main.py codeshift-backend/app/*.py

      - name: Run backend unit tests
        run: |
          cd codeshift-backend
          python3 -m unittest -v

      - name: Verify capabilities contract
        run: |
          cd codeshift-backend
          python3 - <<'PY'
          from app.api import capabilities
          import asyncio

          payload = asyncio.run(capabilities())
          assert payload["service"] == "codeshift"
          assert payload["service_version"] == "v1.2"
          assert "capability_hint" in payload
          assert "RULE_NOT_MATCHED" in payload["error_codes"]
          assert "IDEMPOTENCY_KEY_REUSED" in payload["error_codes"]
          PY

      - name: Verify convert contract
        run: |
          cd codeshift-backend
          python3 - <<'PY'
          import asyncio
          from app.api import convert_code
          from app.schemas import ConvertRequest

          payload = asyncio.run(
              convert_code(
                  ConvertRequest(
                      code='name = "Alice"\\nprint("Hello, " + name)\\n',
                      filename="demo.py",
                      source_language="python",
                      target_language="javascript",
                      allow_ai_fallback=False,
                  ),
                  x_idempotency_key="ci-contract-check",
              )
          )
          assert payload["success"] is True
          assert payload["execution_mode"] == "rule_based"
          assert payload["rule_match_type"] == "string_concatenation"
          assert payload["service_version"] == "v1.2"
          assert payload["idempotency_key"] == "ci-contract-check"
          assert payload["idempotent_replay"] is False
          PY

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codeshift-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: codeshift-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
