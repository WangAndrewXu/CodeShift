name: Skill API Checks

on:
  pull_request:
  push:
    branches:
      - main
      - codex/skill-api-v1
      - codex/skill-api-v1-3
      - codex/skill-api-v1-4

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r codeshift-backend/requirements.txt

      - name: Compile backend modules
        run: python3 -m py_compile codeshift-backend/main.py codeshift-backend/app/*.py

      - name: Run backend unit tests
        run: |
          cd codeshift-backend
          python3 -m unittest -v

      - name: Verify contract snapshots
        run: |
          cd codeshift-backend
          python3 - <<'PY'
          import asyncio
          import json
          from pathlib import Path
          from app.api import capabilities, convert_code
          from app.schemas import ConvertRequest

          with open(Path("contract_snapshots") / "v1.3.json", "r", encoding="utf-8") as handle:
              snapshot = json.load(handle)

          capabilities_payload = asyncio.run(capabilities()).model_dump(mode="json")
          assert set(capabilities_payload.keys()) == set(snapshot["capabilities"]["required_keys"])
          for key, value in snapshot["capabilities"]["expected_values"].items():
              assert capabilities_payload[key] == value
          for error_code in snapshot["capabilities"]["required_error_codes"]:
              assert error_code in capabilities_payload["error_codes"]

          convert_payload = asyncio.run(
              convert_code(
                  ConvertRequest(
                      code='name = "Alice"\\nprint("Hello, " + name)\\n',
                      filename="demo.py",
                      source_language="python",
                      target_language="javascript",
                      allow_ai_fallback=False,
                  ),
                  x_idempotency_key="ci-contract-check",
              )
          ).model_dump(mode="json")
          assert set(convert_payload.keys()) == set(snapshot["convert"]["success_required_keys"])
          for key, value in snapshot["convert"]["success_example"].items():
              assert convert_payload[key] == value
          assert convert_payload["success"] is True
          assert convert_payload["trace_id"].startswith("trace_")
          PY

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codeshift-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: codeshift-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
